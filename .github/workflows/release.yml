name: Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm install

      - name: Build Tauri app (NSIS)
        run: npx tauri build --bundles nsis
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Upload Windows installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-nsis-installer
          path: src-tauri/target/release/bundle/nsis/*.exe
          retention-days: 7

  build-linux:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libglib2.0-dev libgtk-3-dev libwebkit2gtk-4.1-dev

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm install

      - name: Build Tauri app (deb + rpm)
        run: npx tauri build --bundles deb,rpm
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-bundles
          path: src-tauri/target/release/bundle/deb/*.deb
          retention-days: 7

      - name: Upload RPM artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-rpm
          path: src-tauri/target/release/bundle/rpm/*.rpm
          retention-days: 7

  release:
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download Windows installer
        uses: actions/download-artifact@v4
        with:
          name: windows-nsis-installer
          path: artifacts/windows

      - name: Download Linux deb
        uses: actions/download-artifact@v4
        with:
          name: linux-bundles
          path: artifacts/linux

      - name: Download Linux rpm
        uses: actions/download-artifact@v4
        with:
          name: linux-rpm
          path: artifacts/linux

      - name: Generate release info
        id: release_info
        run: |
          TAG="v$(date +'%Y.%m.%d')"
          echo "tag_name=$TAG" >> $GITHUB_OUTPUT
          echo "release_name=$TAG" >> $GITHUB_OUTPUT

          BODY_CHANGES=$(git log --oneline -10 | sed 's/^/ - /')
          printf '## Downloads\n\n' > release_body.md
          printf '### Windows\n- `Subscription.Tracker_*_x64-setup.exe` — NSIS installer\n\n' >> release_body.md
          printf '### Linux\n- `Subscription.Tracker_*_amd64.deb` — Debian/Ubuntu\n- `Subscription.Tracker-*-1.x86_64.rpm` — Fedora/RHEL\n\n' >> release_body.md
          printf '## Changes\n\n' >> release_body.md
          printf '%s\n' "$BODY_CHANGES" >> release_body.md
          echo "body_path=release_body.md" >> $GITHUB_OUTPUT

      - name: Create or update release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_info.outputs.tag_name }}
          name: ${{ steps.release_info.outputs.release_name }}
          body_path: ${{ steps.release_info.outputs.body_path }}
          files: |
            artifacts/windows/*.exe
            artifacts/linux/*.deb
            artifacts/linux/*.rpm
          draft: false
          prerelease: false
          overwrite_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
