name: Publish Release

on:
  push:
    branches:
      - master

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm install

      - name: Build Tauri app (NSIS)
        run: npx tauri build --bundles nsis
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Upload Windows installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-nsis-installer
          path: src-tauri/target/release/bundle/nsis/*.exe
          retention-days: 7

  release:
    needs: build-windows
    runs-on: ubuntu-latest

    steps:
      - name: Download Windows installer
        uses: actions/download-artifact@v4
        with:
          name: windows-nsis-installer
          path: installer

      - name: Generate changelog from commits
        id: changelog
        run: |
          TAG="v$(date +'%Y.%m.%d')"
          BODY="## Windows Installer\n\nDownload the latest `.exe` and run it to install.\n\n### Changes since last release\n\n$(git log --oneline -20 | head -10 | sed 's/^/ - /')"
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "body<<EOF" >> $GITHUB_OUTPUT
          echo "$BODY" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create or update release
        uses: softprops/action-gh-release@v2
        with:
          tag: ${{ steps.changelog.outputs.tag }}
          name: ${{ steps.changelog.outputs.tag }}
          body: ${{ steps.changelog.outputs.body }}
          files: installer/*.exe
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
