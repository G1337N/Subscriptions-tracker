name: Publish Release

on:
  push:
    branches:
      - master

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download Windows installer
        uses: actions/download-artifact@v4
        with:
          name: windows-nsis-installer
          path: installer

      - name: Generate release info
        id: release_info
        run: |
          TAG="v$(date +'%Y.%m.%d')"
          echo "tag_name=$TAG" >> $GITHUB_OUTPUT
          echo "release_name=$TAG" >> $GITHUB_OUTPUT

          BODY_CHANGES=$(git log --oneline -10 | sed 's/^/ - /')
          BODY="## Windows Installer

Download the latest installer and run it to install.

### Changes since last release

${BODY_CHANGES}"
          printf '%s' "$BODY" > release_body.md
          echo "body_path=release_body.md" >> $GITHUB_OUTPUT

      - name: Create or update release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_info.outputs.tag_name }}
          name: ${{ steps.release_info.outputs.release_name }}
          body_path: ${{ steps.release_info.outputs.body_path }}
          files: installer/*.exe
          draft: false
          prerelease: false
          overwrite: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
